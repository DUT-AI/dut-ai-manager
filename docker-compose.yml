# DUT-AI-Manager - Docker Compose
# ================================================
# Databases:
#   - dut_ai_manager_prod (user: dut_ai_admin)
#   - dut_ai_manager_dev  (user: dut_ai_dev)
# ================================================

services:
  # ================================================
  # PostgreSQL Database (Production + Development)
  # ================================================
  postgres:
    image: postgres:16-alpine
    container_name: dut-ai-postgres
    restart: always
    env_file: .env
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "effective_cache_size=1536MB"
      - "-c"
      - "work_mem=32MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "max_connections=100"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dut-ai-network

  # ================================================
  # Backend - FastAPI
  # ================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dut-ai-backend
    restart: always
    env_file: .env
    environment:
      # Override these values for container environment
      - POSTGRES_SERVER=postgres
      - POSTGRES_PORT=5432
    ports:
      - "${BACKEND_PORT}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - dut-ai-network
      - dut-ai-shared

  # ================================================
  # Frontend - React + Vite (Nginx)
  # ================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    container_name: dut-ai-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - dut-ai-network

networks:
  dut-ai-network:
    driver: bridge
  dut-ai-shared:
    external: true
    name: dut-ai-shared